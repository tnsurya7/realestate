# Server Configuration
server.port=${PORT:8080}
spring.application.name=real-estate-crm

# Import .env file securely (available in Spring Boot 2.4+)
spring.config.import=optional:file:.env[.properties]

# Admin Default Configuration
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.name=${ADMIN_NAME}

# PostgreSQL / Neon DB Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Account Locking
app.security.max-failed-attempts=3
app.security.lock-duration-minutes=30

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Springdoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.realestatecrm=DEBUG
logging.level.org.springframework.security=WARN

# SendGrid Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY}
mail.from=${MAIL_FROM}

# Contact Information
app.contact.phone=${CONTACT_PHONE}
app.contact.email=${CONTACT_EMAIL}
app.company.name=${COMPANY_NAME}
app.company.address=${COMPANY_ADDRESS}

# Actuator Configuration (for Docker health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# Startup Optimization
spring.jpa.open-in-view=false
spring.main.lazy-initialization=true
