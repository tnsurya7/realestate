# Server Configuration
server.port=8080
spring.application.name=real-estate-crm

# PostgreSQL / Neon DB Configuration
# Replace the below connection URL with your Neon DB connection string
spring.datasource.url=jdbc:postgresql://ep-xxx-yyy.us-east-2.aws.neon.tech/realestatecrm?sslmode=require
spring.datasource.username=your_neon_username
spring.datasource.password=your_neon_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=RealEstateCRM_SuperSecretKey_2024_MustBe256BitsLong_DoNotShareThis!
app.jwt.expiration-ms=3600000

# Account Locking
app.security.max-failed-attempts=3
app.security.lock-duration-minutes=30

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Springdoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.realestatecrm=DEBUG
logging.level.org.springframework.security=WARN
